name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm exec prisma generate
        env:
          DATABASE_URL: "file:./dev.db"
      - name: Create Next.js type stubs (needed by next-env.d.ts before build)
        run: mkdir -p .next/dev/types && touch .next/dev/types/routes.d.ts
      - run: pnpm exec tsc --noEmit
      - run: pnpm lint
